version: "3.8"

services:
  nats:
    image: nats:2.10
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-m", "8222"]

  appointment-agent:
    build:
      context: ./appointment-agent
    environment:
      NATS_URL: nats://nats:4222
      SLOT_STORE_PATH: /app/data/slots.json
    depends_on:
      - nats
    volumes:
      - appointment-agent-data:/app/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      ORCHESTRATOR_TIMEOUT: 10
      ORCHESTRATOR_MAX_RETRIES: 3
    depends_on:
      - nats
      - appointment-agent
    ports:
      - "8000:8000"

volumes:
  appointment-agent-data:
